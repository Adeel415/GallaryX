name: gallary_flies
description: A feature-rich gallery app with photos, videos, music, and secure vault.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── State Management ───────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Gallery / Media Access ─────────────────────────────────────
  photo_manager: ^3.9.0

  # ── Video Playback ─────────────────────────────────────────────
  video_player: ^2.8.6
  chewie: ^1.8.5

  # ── AUDIO (FIXED STACK) ────────────────────────────────────────
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  file_picker: ^8.1.2

  # ── Permissions ────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── File System ────────────────────────────────────────────────
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Security (PIN hashing) ─────────────────────────────────────
  crypto: ^3.0.3

  # ── Local Database ─────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI Helpers ─────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # ── Utilities ──────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true